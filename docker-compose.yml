services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fairline
      POSTGRES_USER: fairline
      POSTGRES_PASSWORD: fairline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairline"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://fairline:fairline@db:5432/fairline
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ODDS_API_KEY: ${ODDS_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-fairline}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      FAIRLINE_ENV: ${FAIRLINE_ENV:-}
      FAIRLINE_SIM_WEIGHT: ${FAIRLINE_SIM_WEIGHT:-0.25}
      FAIRLINE_WEBHOOK_URL: ${FAIRLINE_WEBHOOK_URL:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
