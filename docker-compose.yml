services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: steambot
      POSTGRES_USER: steambot
      POSTGRES_PASSWORD: steambot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://steambot:steambot@db:5432/steambot
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ODDS_API_KEY: ${ODDS_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    depends_on:
      - db

volumes:
  pgdata:
